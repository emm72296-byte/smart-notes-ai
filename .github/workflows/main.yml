name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Find Gradle and Build APK
        run: |
          # البحث عن المجلد الذي يحتوي على ملفات أندرويد والدخول إليه تلقائياً
          GRADLE_DIR=$(find . -name "gradlew" -exec dirname {} \;)
          if [ -z "$GRADLE_DIR" ]; then
            echo "Gradlew not found, generating one..."
            gradle wrapper
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            cd $GRADLE_DIR
            chmod +x gradlew
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Notes-AI-App
          path: "**/build/outputs/apk/debug/*.apk"
